<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Karyawan Dashboard</title>

    <!--    <link-->
    <!--            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"-->
    <!--            rel="stylesheet"-->
    <!--    />-->

    <!-- Bootstrap 5 -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <!-- Tabler CSS -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css"
    />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* =========================
             DESIGN SYSTEM
          ========================= */

        :root {
          --bg: #f6f7fb;
          --card: #ffffff;
          --text: #0f172a;
          --muted: #64748b;
          --border: #e5e7eb;

          --primary: #2563eb;
          --success: #16a34a;
          --danger: #dc2626;
          --warning: #f59e0b;

          --radius: 16px;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          background: var(--bg);
          color: var(--text);
        }

        /* =========================
             LAYOUT
          ========================= */

        .wrapper {
          display: flex;
          min-height: 100vh;
        }

        /* sidebar placeholder (karena kamu sudah punya sidebar) */
        .sidebar {
          width: 260px;
          background: #111827;
          color: white;
          padding: 20px;
        }

        /* content */
        .content {
          flex: 1;
          padding: 28px;
        }

        /* =========================
             HEADER
          ========================= */

        .header {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          margin-bottom: 22px;
        }

        .header h1 {
          font-size: 26px;
          font-weight: 700;
        }

        .header p {
          color: var(--muted);
          margin-top: 4px;
        }

        /* button */
        .button {
          background: var(--primary);
          color: white;
          border: none;
          padding: 10px 16px;
          border-radius: 12px;
          font-weight: 500;
          cursor: pointer;
          transition: 0.2s;
        }

        .button:hover {
          transform: translateY(-1px);
        }

        /* =========================
             GRID STATS
          ========================= */

        .grid {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 14px;
          margin-top: 18px;
        }

        .card {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 18px;
          transition: 0.2s;
        }

        .card:hover {
          transform: translateY(-2px);
        }

        .card .label {
          font-size: 13px;
          color: var(--muted);
        }

        .card .value {
          font-size: 22px;
          font-weight: 700;
          margin-top: 8px;
        }

        .emp-card {
          display: flex;
          align-items: center;
          justify-content: space-between;

          background: white;
          border: 1px solid var(--border);
          border-radius: 16px;

          padding: 14px 16px;

          transition: 0.2s;
        }

        .emp-card:hover {
          transform: translateY(-2px);
          box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .avatar {
          width: 42px;
          height: 42px;
          border-radius: 50%;

          display: flex;
          align-items: center;
          justify-content: center;

          color: white;
          font-weight: 600;
          font-size: 13px;
        }

        .emp-info {
          flex: 1;
          margin-left: 12px;
        }

        .emp-name {
          font-weight: 600;
          font-size: 15px;
        }

        .emp-meta {
          font-size: 13px;
          color: var(--muted);
          margin-top: 2px;
        }

        .emp-status {
          font-size: 12px;
          padding: 6px 10px;
          border-radius: 999px;
          font-weight: 600;
          margin-right: 10px;
        }

        .emp-status.active {
          background: #dcfce7;
          color: #16a34a;
        }

        .emp-status.resigned {
          background: #fee2e2;
          color: #dc2626;
        }

        .emp-action button {
          border: none;
          background: #f1f5f9;
          padding: 8px 12px;
          border-radius: 10px;
          cursor: pointer;
          transition: 0.2s;
        }

        .emp-action button:hover {
          background: #e2e8f0;
        }

        /* responsive */
        @media (max-width: 900px) {
          .grid {
            grid-template-columns: repeat(2, 1fr);
          }
        }

        @media (max-width: 500px) {
          .grid {
            grid-template-columns: 1fr;
          }
        }

        .page-button {
          border: 1px solid var(--border);
          background: white;
          padding: 8px 12px;
          border-radius: 10px;
          cursor: pointer;
          font-size: 13px;
          transition: 0.2s;
        }

        .page-button:hover {
          background: #f1f5f9;
        }

        .page-button.active {
          background: var(--primary);
          color: white;
          border-color: var(--primary);
        }
        body {
          margin: 0;
          height: 100vh;
          overflow: hidden; /* cegah body ada scrollbar */
        }
        .page {
          display: flex;
          height: 100vh;
          width: 100%;
        }
        aside {
          flex-shrink: 0; /* sidebar tetap ukuran */
        }
        .page-wrapper {
          flex: 1;
          overflow-y: auto; /* hanya konten scroll */
          background-color: #f4f4f4;
        }
         .nav-link.active {
          background-color: rgba(255, 255, 255, 0.1); /* putih transparan */
          color: #e0e7ff;
          padding-left: calc(1rem - 4px); /* agar padding kiri pas */
        }
    </style>
</head>

<body>
<div class="wrapper">
    <!-- SIDEBAR (placeholder) -->
    <aside th:replace="~{fragments/sidebar :: sidebar(sidebarData=${sidebarData})}"></aside>

    <!-- CONTENT -->
    <div class="content page-wrapper">
        <!-- Modal Tambah Karyawan -->
        <div class="modal fade" id="modalTambahKaryawan" data-bs-backdrop="static" data-bs-keyboard="false"
             tabindex="-1" aria-labelledby="modalTambahKaryawanLabel" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content"
                     style="border-radius: var(--radius); border: none; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);">

                    <!-- Modal Header -->
                    <div class="modal-header" style="border-bottom: 1px solid var(--border); padding: 20px;">
                        <h5 class="modal-title" id="modalTambahKaryawanLabel"
                            style="font-weight: 700; font-size: 18px;">
                            👤 Tambah Karyawan Baru
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <!-- Modal Body (Form) -->
                    <form th:action="@{/staff/add}" method="POST">
                        <div class="modal-body" style="padding: 24px; background: #fdfdfd;">
                            <div class="row g-3">

                                <!-- NIK -->
                                <div class="col-md-6">
                                    <label class="form-label font-weight-medium"
                                           style="font-size: 13px; color: var(--muted);">Nomor Induk Kependudukan
                                        (NIK)</label>
                                    <input type="text" class="form-control" name="nik"
                                           placeholder="Masukkan nomor induk kependudukan " required
                                           style="border-radius: 10px; padding: 10px 12px;"/>
                                </div>

                                <!-- Nama Lengkap -->
                                <div class="col-md-6">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted);">Nama
                                        Lengkap</label>
                                    <input type="text" class="form-control" name="nama"
                                           placeholder="Masukkan nama lengkap" required
                                           style="border-radius: 10px; padding: 10px 12px;"/>
                                </div>

                                <!-- Tempat Lahir -->
                                <div class="col-md-6">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted);">Tempat
                                        Lahir</label>
                                    <input type="text" class="form-control" name="tempatLahir"
                                           placeholder="Masukkan tempat lahir" required
                                           style="border-radius: 10px; padding: 10px 12px;"/>
                                </div>

                                <!-- Tanggal Lahir -->
                                <div class="col-md-6">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted);">Tempat
                                        Lahir</label>
                                    <input type="date" class="form-control" name="tanggalLahir"
                                           placeholder="Masukkan tanggal lahir" max="2010-12-31" required
                                           style="border-radius: 10px; padding: 10px 12px;"/>
                                </div>

                                <!-- noHp -->
                                <div class="col-md-6">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted);">No.
                                        Hp</label>
                                    <input type="number" class="form-control" name="noHp" placeholder="08xxxxxxxxx"
                                           required style="border-radius: 10px; padding: 10px 12px;"/>
                                </div>

                                <!-- Nomor Hp Darurat -->
                                <div class="col-md-6">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted);">Nomor
                                        darurat</label>
                                    <input type="number" class="form-control" name="noHpDarurat"
                                           placeholder="08xxxxxxxxx" style="border-radius: 10px; padding: 10px 12px;"/>
                                </div>

                                <!-- Jabatan -->
                                <div class="col-md-6">
                                    <label class="form-label"
                                           style="font-size: 13px; color: var(--muted);">Jabatan</label>
                                    <select class="form-select" name="jabatan" required
                                            style="border-radius: 10px; padding: 10px 12px;">
                                        <option value="" disabled selected>Pilih Jabatan</option>
                                        <option value="KASIR">Kasir</option>
                                        <option value="PROBATION">Probation</option>
                                        <option value="KARYAWAN_ENTRY">Karyawan Entry</option>
                                        <option value="KARYAWAN_JUNIOR">Karyawan Junior</option>
                                        <option value="KARYAWAN_SENIOR">Karyawan Senior</option>
                                    </select>
                                </div>

                                <!-- Jenis Kelamin -->
                                <div class="col-md-6">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted);">Jenis
                                        Kelamin</label>
                                    <select class="form-select" name="jenisKelamin" required
                                            style="border-radius: 10px; padding: 10px 12px;">
                                        <option value="" disabled selected>Pilih Jenis Kelamin</option>
                                        <option value="PRIA">Pria</option>
                                        <option value="WANITA">Wanita</option>
                                    </select>
                                </div>

                                <!-- Pendidikan Terakhir -->
                                <div class="col-md-6">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted);">Pendidikan
                                        Terakhir</label>
                                    <select class="form-select" name="pendidikanTerakhir" required
                                            style="border-radius: 10px; padding: 10px 12px;">
                                        <option value="" disabled selected>Pilih Pendidikan Terakhir</option>
                                        <option value="SD">SD</option>
                                        <option value="SMP">SMP</option>
                                        <option value="SMA">SMA</option>
                                        <option value="S1">Sarjana / S1</option>
                                        <option value="TIDAK_SEKOLAH">Tidak Sekolah</option>
                                    </select>
                                </div>

                                <!-- Tanggal Bergabung -->
                                <div class="col-md-6">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted);">Tanggal
                                        Bergabung</label>
                                    <input type="date" class="form-control" name="tanggalJoin" required
                                           style="border-radius: 10px; padding: 10px 12px;"/>
                                </div>

                                <!-- Gaji Pokok -->
                                <div class="col-md-12">
                                    <label class="form-label" style="font-size: 13px; color: var(--muted);">Gaji Pokok
                                        (Rupiah)</label>
                                    <div class="input-group">
                                        <span class="input-group-text"
                                              style="background: #f1f5f9; border-radius: 10px 0 0 10px;">Rp</span>
                                        <input type="number" class="form-control" name="gaji"
                                               placeholder="Contoh: 4000000" required
                                               style="border-radius: 0 10px 10px 0; padding: 10px 12px;"/>
                                    </div>
                                </div>

                            </div>
                        </div>

                        <!-- Modal Footer -->
                        <div class="modal-footer"
                             style="border-top: 1px solid var(--border); padding: 16px 24px; background: #f8fafc;">
                            <button type="button" class="btn text-secondary" data-bs-dismiss="modal"
                                    style="font-weight: 500;">Batal
                            </button>
                            <button type="submit" class="button" style="padding: 10px 24px;">Simpan Karyawan</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>

        <!-- =========================
     NOTIFIKASI / ALERT SYSTEM
========================== -->
        <div th:if="${message}"
             th:class="${status} ? 'alert alert-success alert-dismissible fade show' : 'alert alert-danger alert-dismissible fade show'"
             role="alert"
             style="border-radius: 12px; margin-bottom: 20px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
            <div class="d-flex align-items-center">
                <!-- Jika status mengevaluasi ke true pasang ✅, jika false pasang ❌ -->
                <span th:text="${status} ? '✅' : '❌'" style="font-size: 18px; margin-right: 10px;"></span>
                <span th:text="${message}">Pesan Notifikasi</span>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <!-- =========================
     HEADER
========================== -->

        <div class="header">
            <div>
                <h1>Dashboard Karyawan</h1>
                Karyawan di <span th:text="${sidebarData.namaToko}">Nama Toko</span>
            </div>

            <button class="button" data-bs-toggle="modal" data-bs-target="#modalTambahKaryawan">
                + Tambah Karyawan
            </button>
        </div>

        <!-- =========================
             STATISTICS
        ========================== -->

        <div class="grid">
            <div class="card">
                <div class="label">Total Karyawan</div>
                <div class="value"><span th:text="${dashboardData.totalKaryawan}">999</span></div>
            </div>

            <div class="card">
                <div class="label">Karyawan Aktif</div>
                <div class="value" style="color: var(--success)"><span
                        th:text="${dashboardData.karyawanAktif}">999 </span></div>
            </div>

            <div class="card">
                <div class="label">Resign</div>
                <div class="value" style="color: var(--danger)"><span th:text="${dashboardData.totalResign}"> 2</span>
                </div>
            </div>

            <div class="card">
                <div class="label">Payroll Bulan Ini</div>
                <div class="value" style="font-size: 18px; color: var(--primary)">
                    <span>Rp <th:block th:text="${dashboardData.payroll != null ? #numbers.formatInteger(dashboardData.payroll, 1, 'POINT') : '0'}"></th:block></span>                </div>
            </div>
        </div>
        <!-- =========================
     TOOLBAR
========================== -->

        <div
                style="
            margin-top: 22px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
          "
        >
            <!-- SEARCH -->
            <input
                    type="text"
                    id="searchInput"
                    placeholder="Cari nama, NIK, atau jabatan..."
                    style="
              width: 100%;
              max-width: 420px;
              padding: 12px 14px;
              border-radius: 12px;
              border: 1px solid var(--border);
              outline: none;
              background: white;
            "
            />

            <!-- OPTIONAL FILTER PLACEHOLDER -->
            <select
                    style="
              padding: 12px 14px;
              border-radius: 12px;
              border: 1px solid var(--border);
              background: white;
              color: var(--text);
            "
            >
                <option>Semua Jabatan</option>
                <option>Kasir</option>
                <option>Gudang</option>
                <option>Admin</option>
                <option>Supervisor</option>
            </select>
        </div>

        <!-- =========================
             LIST CONTAINER
        ========================== -->
        <!-- =========================
     LIST CONTAINER
========================== -->
        <div style="margin-top: 18px; display: flex; flex-direction: column; gap: 10px;">

            <!-- Menggunakan th:each untuk looping data dari backend -->
            <div class="emp-card" th:each="staff : ${dashboardData.listStaff}">

                <!-- AVATAR: Mengambil huruf pertama dari kata pertama dan kedua -->
                <!-- Jika nama hanya 1 kata, Thymeleaf akan aman dengan logika di bawah -->
                <div class="avatar"
                     th:style="'background: ' + (${staff.jenisKelamin == 'PRIA'} ? '#2563eb' : '#db2777')"
                     th:text="${#strings.substring(staff.nama, 0, 1)} + ${#strings.contains(staff.nama, ' ') ? #strings.substring(#strings.arraySplit(staff.nama, ' ')[1], 0, 1) : ''}">
                    AS
                </div>

                <!-- INFO STAFF -->
                <div class="emp-info">
                    <!-- Nama Lengkap -->
                    <div class="emp-name" th:text="${staff.nama}">Nama Karyawan</div>

                    <!-- Jabatan & Tanggal Gabung (Format: dd MMM yyyy) -->
                    <div class="emp-meta">
                        <span th:text="${staff.jabatan}">Jabatan</span> •
                        Join <span th:text="${#temporals.format(staff.tanggalJoin, 'dd MMM yyyy')}">10 Jan 2024</span>
                    </div>
                </div>

                <!-- STATUS: Jika tanggalResign null berarti Aktif, jika ada isinya berarti Resign -->
                <div th:class="${staff.tanggalResign == null} ? 'emp-status active' : 'emp-status resigned'"
                     th:text="${staff.tanggalResign == null} ? 'Aktif' : 'Resign'">
                    Aktif
                </div>

                <!-- AKSYON / DETAIL -->
                <div class="emp-action">
                    <!-- Mengarahkan ke endpoint detail menggunakan staffId -->
                    <a th:href="@{/staff/detail/{id}(id=${staff.staffId})}" style="text-decoration: none;">
                        <button type="button">Detail</button>
                    </a>
                </div>
            </div>

            <!-- Tampilkan info jika listStaff kosong -->
            <div id="emptyState" th:if="${#lists.isEmpty(dashboardData.listStaff)}" style="display: block; text-align: center; padding: 40px; color: var(--muted);">
                <div style="font-size: 40px">👤</div>
                <div style="margin-top: 10px">Belum ada data karyawan</div>
            </div>
        </div>
    </div>
    <!-- content -->
</div>
<!-- wrapper -->
</body>
<script>
    const searchInput = document.getElementById("searchInput");
    const cards = document.querySelectorAll(".emp-card");
    const emptyState = document.getElementById("emptyState");

    searchInput.addEventListener("input", function () {
      let keyword = this.value.toLowerCase();
      let found = 0;

      cards.forEach((card) => {
        let text = card.innerText.toLowerCase();

        if (text.includes(keyword)) {
          card.style.display = "flex";
          found++;
        } else {
          card.style.display = "none";
        }
      });

      if (found === 0) {
        emptyState.style.display = "block";
      } else {
        emptyState.style.display = "none";
      }
    });

<!--    Untuk handle modal tambah karyawan-->
    const modalTambah = document.getElementById('modalTambahKaryawan');
    const formTambah = modalTambah.querySelector('form');

    // Jalankan fungsi ini setiap kali modal SELESAI ditutup (dismissed)
    modalTambah.addEventListener('hidden.bs.modal', function () {
        // Reset semua input, select, dan textarea ke kondisi awal
        formTambah.reset();
    });
</script>
</html>
